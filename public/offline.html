<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#17211c" />
    <title>FocusFlow — オフライン</title>
    <style>
      :root { color-scheme: light; --ink: #17211c; --line: #e5e9e2; --canvas: #f4f6f0; --lime: #cbea62; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: var(--canvas); color: var(--ink); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif; }
      main { width: min(460px, 100%); padding: 28px; border: 1px solid var(--line); border-radius: 22px; background: #fff; box-shadow: 0 18px 50px rgba(31, 49, 38, .08); }
      .mark { width: 42px; height: 42px; display: grid; place-items: center; border-radius: 13px; background: var(--ink); color: var(--lime); font-weight: 800; transform: rotate(-4deg); }
      h1 { margin: 18px 0 8px; font-size: 24px; line-height: 1.2; letter-spacing: -.4px; }
      p { margin: 0; color: #68736a; font-size: 14px; line-height: 1.75; }
      a { display: inline-flex; margin-top: 20px; padding: 11px 15px; border-radius: 10px; background: var(--ink); color: #fff; text-decoration: none; font-size: 13px; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">F</div>
      <h1>オフラインです</h1>
      <p>接続が戻ると、FocusFlowを再び読み込めます。すでに保存済みの作業データはこの端末に残っています。</p>
      <a href="/">もう一度開く</a>
    </main>
  </body>
</html>
